spring.application.name=deploy

# Server port - Render will set this
server.port=${PORT:8081}

# ==================================================
# DATABASE CONFIGURATION - Use environment variables
# ==================================================
# These will be set in Render.com dashboard
#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cruddb}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:asgar@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.indent-output=true

# Actuator for health checks (needed by Render)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
